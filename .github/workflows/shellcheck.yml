name: ShellCheck

on:
  push:
    branches: ["**"]
    paths:
      - "**.sh"
      - ".shellcheckrc"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "**.sh"
      - ".shellcheckrc"

jobs:
  shellcheck:
    name: Static analysis (ShellCheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          # Code suppressions live in .shellcheckrc so they apply locally too.
          # Valid inputs: additional_files, ignore, ignore_paths, ignore_names,
          #   severity, check_together, scandir, disable_matcher, format, version
          severity: warning
          scandir: "."
          # setup/interface was removed in favour of setup/management/create_manager_service.js.
          # Delete it from git with: git rm -r setup/interface/
          # Until that commit lands, keep it excluded here so the transition does not block CI.
          ignore_paths: "scripts/minecraft-server-manager setup/interface"
