name: ShellCheck

on:
  push:
    branches: ["**"]
    paths:
      - "**.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "**.sh"

jobs:
  shellcheck:
    name: Static analysis (ShellCheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          # SC2034: unused variables (common in sourced files)
          # SC1091: don't follow sourced files (paths not present in CI)
          ignore_codes: "SC2034,SC1091"
          severity: warning
          scandir: "."
